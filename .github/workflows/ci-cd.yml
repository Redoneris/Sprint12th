name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Тестирование кода
  test:
    runs-on: ubuntu-latest
    container: golang:1.25  # Используем контейнер с Go
    steps:
      - uses: actions/checkout@v4

      - name: Run Unit Tests
        run: GOOS=linux GOARCH=amd64 go test -v ./...

      - name: Vet (проверка стиля и потенциальных ошибок)
        run: go vet ./...

      # Дополнительно: проверка на состояние гонки (если нужно)
      - name: Test with Race Detection
        run: go test -race -v ./...

  # JOB 2: Публикация в DockerHub (только по тегам)
  deploy:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: test  # Ждем успешного завершения тестов
    if: startsWith(github.ref, 'refs/tags')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/my-app

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}